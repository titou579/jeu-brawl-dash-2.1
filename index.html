<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Dash 2.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu" class="menu-screen">
        <h1>BRAWL DASH 2.1</h1>
        <p>Brawler actuel : <span id="current-brawler-display" style="color: #ffcc00; cursor: pointer; font-weight: bold;">Shelly</span></p>
        <button id="btn-start" class="btn">Jouer</button>
        <button id="btn-shop" class="btn">Boutique</button>
    </div>

    <div id="shop-menu" class="menu-screen hidden">
        <h2>BOUTIQUE</h2>
        <p>Pièces : <span id="coin-count">0</span> 🪙</p>
        <div class="shop-item">
            <span>Améliorer Vitesse (Niveau <span id="speed-lvl">1</span>)</span>
            <button id="buy-speed" class="btn-shop">Acheter (100 🪙)</button>
        </div>
        <div class="shop-item">
            <span>Améliorer Dégâts (Niveau <span id="dmg-lvl">1</span>)</span>
            <button id="buy-dmg" class="btn-shop">Acheter (150 🪙)</button>
        </div>
        <div class="shop-item" style="display: none;">
            <button id="unlock-colt"></button>
        </div>
        <button id="btn-close-shop" class="btn">Retour</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="hud">
            <div>Score: <span id="hud-score">0</span></div>
            <div>HP: <span id="hud-hp">100</span> / 100</div>
            <button id="btn-pause-trigger">⏸ Pause</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="control-group-left">
                <button id="btn-m-left" class="btn-ctrl">◀</button>
                <button id="btn-m-right" class="btn-ctrl">▶</button>
            </div>
            <button id="btn-config-layout" style="position: absolute; top: -40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px;">Inverser Manettes</button>
            <div class="control-group-right">
                <button id="btn-m-jump" class="btn-ctrl action-btn">SAUTER</button>
                <button id="btn-m-shoot" class="btn-ctrl action-btn shoot-btn">TIRER</button>
            </div>
        </div>
    </div>

    <div id="pause-menu" class="menu-screen hidden" style="background: rgba(0,0,0,0.85);">
        <h2>PAUSE</h2>
        <button id="btn-resume" class="btn">Reprendre</button>
        <button id="btn-quit" class="btn quit">Quitter</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
